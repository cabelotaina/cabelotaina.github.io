<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <!-- Primary SEO -->
    <title>Maurilio Atila — Full Stack Developer & Tech Lead</title>
    <meta name="description" content="Full Stack Developer & Tech Lead with 12+ years in web, mobile and cloud. React · Vue.js · Node.js · AWS. Madrid-based, available part-time (4h/day).">
    <meta name="author" content="Maurilio Atila">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://cabelotaina.github.io/">

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cabelotaina.github.io/">
    <meta property="og:title" content="Maurilio Atila — Full Stack Developer & Tech Lead">
    <meta property="og:description" content="12+ years building products in web, mobile and cloud. React · Vue.js · Node.js · AWS. Madrid-based, available part-time.">
    <meta property="og:image" content="https://cabelotaina.github.io/og-image.png">
    <meta property="og:image:width" content="400">
    <meta property="og:image:height" content="400">
    <meta property="og:image:alt" content="Maurilio Atila — Full Stack Developer">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Maurilio Atila">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Maurilio Atila — Full Stack Developer & Tech Lead">
    <meta name="twitter:description" content="12+ years building products in web, mobile and cloud. React · Vue.js · Node.js · AWS. Madrid-based, available part-time.">
    <meta name="twitter:image" content="https://cabelotaina.github.io/og-image.png">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="<%= BASE_URL %>favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="<%= BASE_URL %>favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="<%= BASE_URL %>favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="<%= BASE_URL %>apple-touch-icon.png">
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
