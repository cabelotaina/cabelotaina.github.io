<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <!-- Primary SEO -->
    <title>Maurilio Atila — Full Stack Developer & Tech Lead · Remote</title>
    <meta name="description" content="Full Stack Developer & Tech Lead · 12+ years · Remote-first · Vue.js · Node.js · AWS · Available for freelance projects in ES, EN or PT. Desarrollador full stack remoto. Desenvolvedor full stack remoto.">
    <meta name="keywords" content="full stack developer remote, Vue.js developer, Node.js developer, React developer, freelance developer remote, desarrollador full stack remoto, desarrollador Vue.js freelance, freelance developer Spain, Vue.js expert freelance, desenvolvedor full stack remoto, desenvolvedor Vue.js, remote developer Europe, full stack developer Madrid, tech lead remote, AWS developer freelance">
    <meta name="author" content="Maurilio Atila">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://cabelotaina.github.io/">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Maurilio Atila",
      "url": "https://cabelotaina.github.io/",
      "image": "https://cabelotaina.github.io/og-image.png",
      "jobTitle": "Full Stack Developer & Tech Lead",
      "description": "Full Stack Developer & Tech Lead with 12+ years in web, mobile and cloud. Remote-first. Available for freelance projects in Spanish, English or Portuguese.",
      "knowsLanguage": ["en", "es", "pt"],
      "address": { "@type": "PostalAddress", "addressLocality": "Madrid", "addressCountry": "ES" },
      "sameAs": [
        "https://www.linkedin.com/in/maurilio-atila/",
        "https://github.com/cabelotaina",
        "https://www.malt.es/profile/mauriliosantana1"
      ],
      "knowsAbout": ["Vue.js", "React", "Node.js", "AWS", "TypeScript", "MongoDB", "Docker", "Android", "iOS", "Ionic", "Python", "Java", "Spring Boot", "GitHub Actions", "CI/CD"]
    }
    </script>

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cabelotaina.github.io/">
    <meta property="og:title" content="Maurilio Atila — Full Stack Developer & Tech Lead · Remote">

    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="400">
    <meta property="og:image:height" content="400">
    <meta property="og:image:alt" content="Maurilio Atila — Full Stack Developer">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Maurilio Atila">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Maurilio Atila — Full Stack Developer & Tech Lead · Remote">
    <meta name="twitter:description" content="12+ years building products in web, mobile and cloud. Remote-first. Vue.js · Node.js · React · AWS. Available for freelance in ES, EN or PT.">
    <meta name="twitter:image" content="https://cabelotaina.github.io/og-image.png">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="<%= BASE_URL %>favicon.ico">

    <link rel="icon" type="image/png" sizes="16x16" href="<%= BASE_URL %>favicon-16.png">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8FK7H5TRLV"></script>

      function gtag(){dataLayer.push(arguments);}
